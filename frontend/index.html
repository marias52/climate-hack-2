<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EcoRestore Somalia</title>
    <meta name="description" content="Decision support for environmental interventions in Somalia." />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <div class="brandName">EcoRestore Somalia</div>
          <div class="brandTag">From monitoring to intervention planning</div>
        </div>
      </div>
      <div class="meta">
        <div class="pill"><span class="k">Scope</span><span class="v">Somali districts (mock)</span></div>
        <div class="pill"><span class="k">Output</span><span class="v">Score + package</span></div>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <div class="cardHead">
          <div>
            <div class="cardTitle">District Priority List</div>
            <div class="cardSub">Sorted by computed score. Click a district for details.</div>
          </div>
        </div>
        <div class="cardBody">
          <div class="filters">
            <label class="field">
              <div class="fieldLabel">Search</div>
              <input id="q" class="input" placeholder="e.g., Lower Juba" />
            </label>
            <label class="field">
              <div class="fieldLabel">Risk</div>
              <select id="risk" class="select">
                <option value="All">All</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
                <option value="Critical">Critical</option>
              </select>
            </label>
          </div>

          <div class="tableWrap" role="region" aria-label="District ranking table">
            <table class="table">
              <thead>
                <tr>
                  <th>District</th>
                  <th>Region</th>
                  <th class="num">Score</th>
                  <th>Risk</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="cardHead">
          <div>
            <div id="detailTitle" class="cardTitle">Select a district</div>
            <div id="detailSub" class="cardSub">Pick one on the left</div>
          </div>
        </div>
        <div class="cardBody">
          <div id="detail" class="detail"></div>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
